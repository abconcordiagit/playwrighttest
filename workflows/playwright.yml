name: Playwright Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Run Playwright tests
      - name: Run Playwright Tests
        id: test
        run: npx playwright test
        continue-on-error: true

      # Upload Playwright HTML report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      # Set Slack message status
      - name: Set Slack Status
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" == "success" ]; then
            echo "STATUS=✅ PASS" >> $GITHUB_ENV
            echo "COLOR=good" >> $GITHUB_ENV
          else
            echo "STATUS=❌ FAIL" >> $GITHUB_ENV
            echo "COLOR=danger" >> $GITHUB_ENV
          fi

      # Send Slack notification
      - name: Send Slack Notification
        if: always()
        run: |
          curl -X POST \
          -H 'Content-type: application/json' \
          --data '{"text":"✅ Playwright Tests Passed"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}